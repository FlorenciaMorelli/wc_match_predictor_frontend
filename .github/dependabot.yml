version: 2
updates:
  # Dependencias npm
  - package-ecosystem: "npm"
    directory: "/"
    # Los PRs van a staging (rama de integración), no a main (default). Así entran
    # por el flujo normal con CI y no rompen el guard de main (main == staging).
    target-branch: "staging"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Agrupa actualizaciones menores/patch en un solo PR para reducir ruido.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Actualizaciones de las GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"

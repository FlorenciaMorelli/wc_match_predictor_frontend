name: Guard main

# Asegura que `main` refleje EXACTAMENTE el contenido de `staging`.
#
# La promoción usa `git merge --squash staging` + commit: eso crea un commit NUEVO en
# main que NO está contenido en staging, así que no se puede validar por ancestría /
# fast-forward. Lo que sí se cumple tras un squash-promote es que el ÁRBOL de main es
# idéntico al de staging. Este guard verifica esa igualdad de contenido (git diff vacío).
#
# Importante: las Actions corren DESPUÉS de que el push fue aceptado, así que esto NO
# revierte el push — es una red de seguridad que avisa fuerte. Se combina con el ruleset
# de `main` (push restringido + historial lineal) y con el squash-promote del lado del cliente.

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (historial completo)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: main debe reflejar el contenido de staging
        run: |
          set -euo pipefail
          NEW_SHA="${{ github.event.after }}"

          # Push de borrado de rama: no hay nada que validar.
          if [ "$NEW_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "Borrado de rama, se omite."
            exit 0
          fi

          git fetch --no-tags origin staging
          STAGING_SHA="$(git rev-parse FETCH_HEAD)"

          echo "main:    $NEW_SHA"
          echo "staging: $STAGING_SHA"

          if git diff --quiet "$NEW_SHA" "$STAGING_SHA"; then
            echo "✅ main refleja exactamente el contenido de staging."
          else
            echo "::error::El contenido de main no coincide con staging. Promové con 'git merge --squash staging' para que main refleje staging."
            git diff --stat "$NEW_SHA" "$STAGING_SHA" || true
            exit 1
          fi

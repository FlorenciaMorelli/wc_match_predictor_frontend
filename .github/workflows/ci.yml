name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging

# Cancela corridas previas del mismo ref cuando llega un push nuevo (ahorra minutos
# y evita checks obsoletos en una rama con varios pushes seguidos).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build application
        run: npm run build
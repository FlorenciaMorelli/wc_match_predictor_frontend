<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Pelota de fútbol minimalista: círculo navy + 3 costuras blancas + anillo dorado -->
  <circle cx="16" cy="16" r="13.5" fill="#183a70"/>
  <!-- Costura ecuatorial -->
  <path d="M 2.5,16 C 8,9.5 24,9.5 29.5,16" stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" stroke-opacity="0.75"/>
  <!-- Costura meridional izquierda -->
  <path d="M 16,2.5 C 9,8 9,24 16,29.5" stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" stroke-opacity="0.75"/>
  <!-- Costura meridional derecha -->
  <path d="M 16,2.5 C 23,8 23,24 16,29.5" stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" stroke-opacity="0.75"/>
  <!-- Anillo dorado -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
</svg>
